<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Receitas</h1>
    <h2>Vou mostrar algumas receitas que gosto</h2>
</header>

<main>

    <h2 class="categoria">🍽️ Pratos Salgados</h2>

    <div class="galeria">

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQMeaH_JgGqWnBcPecknIm_Q16ywKU8t9xVRFvKoNrcim0_J0-JBbubXH9DQoD7a-K-0AO9-QeqsHBZ4__Uu2WYHAE7vtAVwIcz-lkXGg&s=10"
            alt="Oniguiri"
            onclick="mostrarReceita('oniguiri')">
            <p>Oniguiri</p>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Lasagne_-_stonesoup.jpg"
            alt="Lasanha"
            onclick="mostrarReceita('lasanha')">
            <p>Lasanha</p>
        </div>

        <div class="card">
            <img src="https://i0.statig.com.br/bancodeimagens/6v/fv/ti/6vfvtiprnvb3ofj24k5zo27p4.jpg"
            alt="Macarrão"
            onclick="mostrarReceita('macarrao')">
            <p>Macarrão de Gravata</p>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtDPo1PyNZg2qPXI9dbnTie4wefzEidQL53xQtCHuKvEN3lDbKCrkLer8&s=10"
            alt="Feijoada"
            onclick="mostrarReceita('feijoada')">
            <p>Feijoada</p>
        </div>

        <div class="card">
    <img src="https://www.unileverfoodsolutions.com.br/dam/global-ufs/mcos/SLA/calcmenu/recipes/BR-recipes/chicken-&-other-poultry-dishes/strogonoff-de-frango/main-header.jpg"
         alt="Strogonoff"
         onclick="mostrarReceita('strogonoff')">
         <p>Strogonoff</p>
        </div>

    </div>

    <h2 class="categoria">🍰 Doces</h2>

    <div class="galeria">
        <div class="card">
            <img src="https://www.sabornamesa.com.br/media/k2/items/cache/5003d452a8da016f3ed02a6385cf54e8_XL.jpg"
            alt="Brigadeiro"
            onclick="mostrarReceita('brigadeiro')">
            <p>Brigadeiro</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=400"
            alt="Cookies"
            onclick="mostrarReceita('cookies')">
            <p>Cookies</p>
        </div>

        <div class="card">
            <img src="https://s2-receitas.glbimg.com/uPaa4DqJ3jIyee1w_KHQhVimQWk=/0x0:5472x3648/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_1f540e0b94d8437dbbc39d567a1dee68/internal_photos/bs/2022/2/z/wnk5GRQxS3BPlCBik1qA/bolo-de-cenoura-com-ganache1.jpg"
            alt="Bolo de Cenoura"
            onclick="mostrarReceita('bolo')">
            <p>Bolo de Cenoura</p>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ3XrLuaBiLS2RGJamaBATuov0jenYodLY6mkSfstCBO8rnKw1pOrwsN453&s=10"
             alt="Suspiro"
             onclick="mostrarReceita('suspiro')">
            <p>Suspiro</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400"
            alt="Brownie"
            onclick="mostrarReceita('brownie')">
            <p>Brownie</p>
        </div>

    </div>

    <section id="receita">
        <h3>Clique em uma imagem para visualizar a receita.</h3>
    </section>

</main>

<div class="interacoes">

    <button onclick="curtir()">
        ❤️ Curtidas <span id="likes">0</span>
    </button>

    <button onclick="descurtir()">
        💔 Deslikes <span id="deslikes">0</span>
    </button>

    <button onclick="comentar()">
        ⭐ Comentários <span id="comentarios">0</span>
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
